version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb_local
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: mongod --bind_ip_all --noauth # SIN autenticación
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - db_network

  redis:
    image: redis:7-alpine
    container_name: redis_local
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - db_network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      # SIN credenciales de MongoDB
    depends_on:
      - mongodb
    networks:
      - db_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis123
    depends_on:
      - redis
    networks:
      - db_network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  db_network:
    driver: bridge
